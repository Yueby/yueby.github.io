<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yueby</title>
    <link rel="stylesheet" href="./res/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>
    <!-- 背景装饰 -->
    <div class="bg-pattern"></div>
    
    <!-- 主要容器 -->
    <main class="main-container">
        <!-- 头像区域 -->
        <section class="avatar-section">
            <div class="avatar-wrapper">
                <div class="avatar-glow"></div>
                <div class="avatar-ring"></div>
                <a id="avatar-link" href="./res/data/vip.txt" class="avatar" aria-label="查看 VIP 列表">
                    <img src="./res/img/0.png" alt="Yueby" class="avatar-img">
                </a>
            </div>
            <h1 class="name">Yueby</h1>
            <p class="tagline">保持热爱 ·奔赴山海</p>
        </section>

        <!-- 社交链接 -->
        <nav class="social-links">
            <a href="https://github.com/yueby" target="_blank" class="social-link" aria-label="GitHub">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                </svg>
            </a>
            <button class="social-link vip-toggle" aria-label="VIP 名单" data-panel="vip-panel">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
            </button>
        </nav>

        <!-- VIP 面板 -->
        <aside class="vip-panel" id="vip-panel" aria-hidden="true">
            <div class="vip-panel-header">
                <h2 class="vip-panel-title">VIP Members</h2>
                <button class="vip-panel-close" aria-label="关闭">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="vip-list" id="vip-list">
                <!-- VIP 名单将通过 JS 加载 -->
            </div>
        </aside>
    </main>

    <script src="./res/js/main.js" defer></script>
</body>

</html>
